services:
  open-webui-validation:
    image: ghcr.io/open-webui/open-webui:v0.10.2@sha256:9fcea9c6e32ab60b0498f3986c6cdf651ddbe61db48d2213a3d28048ddd673d4
    pull_policy: never
    container_name: open-webui-validation
    network_mode: bridge
    ports:
      - "127.0.0.1:3001:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_BASE_URLS: "http://host.docker.internal:11434"
      ENABLE_PERSISTENT_CONFIG: "False"
      RAG_TEMPLATE: |-
        Use only the information inside the <context> block to answer the user's question.

        Do not use outside knowledge.
        Do not copy instructions or examples from this template.
        If the requested information is not present in the context, respond exactly: NOT FOUND.
        When the context includes a source id, cite the supporting source using [id].
        Return a direct answer without commentary.

        <context>
        {{CONTEXT}}
        </context>
      RAG_EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
      CHUNK_SIZE: "1000"
      CHUNK_OVERLAP: "100"
      RAG_TEXT_SPLITTER: "character"
      ENABLE_MARKDOWN_HEADER_TEXT_SPLITTER: "True"
      RAG_TOP_K: "3"
      RAG_RELEVANCE_THRESHOLD: "0"
      ENABLE_RAG_HYBRID_SEARCH: "False"
      BYPASS_EMBEDDING_AND_RETRIEVAL: "False"
      RAG_FULL_CONTEXT: "False"
      ENABLE_WEB_SEARCH: "False"
      ENABLE_RETRIEVAL_QUERY_GENERATION: "True"
    volumes:
      - "open-webui-validation:/app/backend/data"
    restart: "no"

volumes:
  open-webui-validation:
    name: open-webui-validation
